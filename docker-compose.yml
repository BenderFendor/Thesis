version: '3.8'
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: newsuser
      POSTGRES_PASSWORD: newspass
      POSTGRES_DB: newsdb
    ports:
      - "6543:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: |
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c wal_compression=zstd
      -c max_connections=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=4MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsuser -d newsdb"]
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 10
    networks:
      - thesis_network

  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_SERVER_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - thesis_network

  embedding-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn app.embedding_service:app --host 0.0.0.0 --port 8002
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - THESIS_RUNTIME_DIR=/runtime-data
      - THESIS_SERVICE_NAME=embedding-worker
      - THESIS_OBSERVABILITY_ENABLED=1
      - THESIS_PERFORMANCE_SAMPLE_SECONDS=5
      - DEBUG_LOG_DIR=/runtime-data/logs/embedding-worker
      - LOG_DIR=/runtime-data/logs/embedding-worker/sessions
    volumes:
      - ./runtime-data:/runtime-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - thesis_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://newsuser:newspass@postgres:5432/newsdb
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - EMBEDDING_SERVICE_URL=http://embedding-worker:8002
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001,https://test.jordandgreen.com
      - CORS_ORIGIN_REGEX=^https://([a-z0-9-]+\.)?jordandgreen\.com$
      - THESIS_RUNTIME_DIR=/runtime-data
      - THESIS_SERVICE_NAME=backend
      - THESIS_OBSERVABILITY_ENABLED=1
      - THESIS_PERFORMANCE_SAMPLE_SECONDS=5
      - DEBUG_LOG_DIR=/runtime-data/logs/backend
      - LOG_DIR=/runtime-data/logs/backend/sessions
      - OTEL_ENABLED=1
      - OTEL_SAMPLE_RATE=1.0
      - OTEL_CONSOLE_EXPORT=0
    volumes:
      - ./backend:/app
      - ./runtime-data:/runtime-data
      - backend_cache:/app/.venv
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
      embedding-worker:
        condition: service_healthy
    networks:
      - thesis_network
    dns:
      - 8.8.8.8  # Google DNS
      - 1.1.1.1  # Cloudflare DNS

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - thesis_network

networks:
  thesis_network:
    driver: bridge

volumes:
  postgres_data:
  chromadb_data:
  backend_cache:
  node_modules:
