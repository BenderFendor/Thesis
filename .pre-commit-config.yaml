repos:
  # Python: ruff (lint + format)
  - repo: local
    hooks:
      - id: ruff
        name: ruff (fix)
        language: system
        entry: uvx ruff check backend --fix
        pass_filenames: false
        files: ^backend/.*\.py$

      - id: ruff-format
        name: ruff format
        language: system
        entry: uvx ruff format backend
        pass_filenames: false
        files: ^backend/.*\.py$

  # Python: mypy strict
  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict)
        language: system
        entry: bash -lc 'cd backend && MYPYPATH=. .venv/bin/mypy --explicit-package-bases app --strict'
        pass_filenames: false
        files: ^backend/.*\.py$

  # TypeScript: strict typecheck + lint
  - repo: local
    hooks:
      - id: tsc-noemit
        name: tsc (noEmit)
        language: system
        entry: npm --prefix frontend exec -- tsc -p frontend/tsconfig.json --noEmit
        pass_filenames: false
        files: ^frontend/.*\.(ts|tsx)$

      - id: eslint
        name: eslint
        language: system
        entry: npm --prefix frontend run lint
        pass_filenames: false
        files: ^frontend/.*\.(ts|tsx|js|jsx)$

  # Rust: clippy + fmt
  - repo: local
    hooks:
      - id: cargo-clippy
        name: cargo clippy
        language: system
        entry: cargo clippy --manifest-path backend/rss_parser_rust/Cargo.toml -- -D warnings
        pass_filenames: false
        files: ^backend/rss_parser_rust/.*\.rs$

      - id: cargo-fmt
        name: cargo fmt check
        language: system
        entry: cargo fmt --manifest-path backend/rss_parser_rust/Cargo.toml --all -- --check
        pass_filenames: false
        files: ^backend/rss_parser_rust/.*\.rs$

  # Tests: pytest (fast only)
  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (not slow)
        language: system
        entry: uv run pytest backend/tests -m "not slow"
        pass_filenames: false
        files: ^backend/.*\.py$
