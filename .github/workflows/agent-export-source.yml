name: Agent source export

on:
  push:
    branches:
      - agent/frontend-architecture-ux

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Package source tree
        run: |
          tar --exclude=.git --exclude=node_modules --exclude=.next -czf /tmp/thesis-source.tar.gz .
      - name: Upload source tree
        uses: actions/upload-artifact@v4
        with:
          name: thesis-source
          path: /tmp/thesis-source.tar.gz
          retention-days: 1
